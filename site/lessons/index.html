<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Paper Lesson</title>
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <div class="lesson-shell">
    <header class="lesson-topbar">
      <div>
        <p class="eyebrow">Detailed Understand</p>
        <h1 id="lesson-title">Loading lesson...</h1>
        <p id="lesson-subtitle" class="subtitle"></p>
      </div>
      <div class="lesson-actions">
        <button id="print-pdf-btn" class="primary-btn" type="button">Print / Save PDF</button>
        <a id="paper-link-btn" class="secondary-btn" href="#" target="_blank" rel="noreferrer">Open Paper</a>
      </div>
    </header>
    <main id="lesson-root" class="lesson-root"></main>
  </div>
  <script src="./app.js"></script>
</body>
</html>
